# cargo-deny configuration
# Run: cargo deny check

[advisories]
# vulnerability, yanked, and notice are now "deny by default" in cargo-deny >=0.15
# unmaintained must be one of: "all", "workspace", "transitive", "none"
unmaintained = "workspace"
ignore = [
    "RUSTSEC-2023-0071", # Marvin Attack for rsa (no upgrade available)
]
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "MPL-2.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
